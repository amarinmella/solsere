    <circle cx="0" cy="0" r="22" fill="#C9A84C" opacity="0.7"/>
    <!-- Estambres -->
    <circle cx="0" cy="-12" r="3" fill="#2D5A27" opacity="0.5"/>
    <circle cx="10" cy="6" r="3" fill="#2D5A27" opacity="0.5"/>
    <circle cx="-10" cy="6" r="3" fill="#2D5A27" opacity="0.5"/>
  </g>
  <!-- Hojitas acompañantes -->
  <path d="M50,320 Q80,280 120,310 Q90,340 50,320Z" fill="#4A7C40" opacity="0.5"/>
  <path d="M60,340 Q100,310 130,340 Q100,370 60,340Z" fill="#8DB87A" opacity="0.4"/>
  <path d="M320,60 Q350,30 370,70 Q340,90 320,60Z" fill="#4A7C40" opacity="0.45"/>
