<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Flor grande decorativa -->
  <g transform="translate(200,200)">
    <!-- Pétalos exteriores -->
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#B8C9A8" opacity="0.7" transform="rotate(0)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#8DB87A" opacity="0.6" transform="rotate(40)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#B8C9A8" opacity="0.7" transform="rotate(80)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#8DB87A" opacity="0.6" transform="rotate(120)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#B8C9A8" opacity="0.7" transform="rotate(160)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#8DB87A" opacity="0.6" transform="rotate(200)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#B8C9A8" opacity="0.7" transform="rotate(240)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#8DB87A" opacity="0.6" transform="rotate(280)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="#B8C9A8" opacity="0.7" transform="rotate(320)"/>
    <!-- Centro -->
